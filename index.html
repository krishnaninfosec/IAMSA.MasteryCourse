<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IAM Solution Architect — Mastery Course</title>
<style>
:root{
  --ink:#15233B; --ink-soft:#3A4A63; --blue:#2E6CA6; --blue-deep:#1F3864;
  --paper:#FAFAF7; --surface:#FFFFFF; --surface-2:#F3F5F8;
  --line:#E4E7EC; --line-soft:#EEF1F5;
  --amber:#A86A12; --amber-fill:#F7EAD0; --amber-line:#E7C98C;
  --green:#2F7D5B; --green-fill:#E4F0EA;
  --muted:#6A7689; --shadow:0 1px 2px rgba(21,35,59,.04),0 6px 20px rgba(21,35,59,.06);
  --serif:Georgia,"Iowan Old Style","Times New Roman",serif;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Code",Consolas,monospace;
  --r:10px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none}
.eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
h1,h2,h3,h4{font-family:var(--serif);font-weight:600;color:var(--ink);line-height:1.25}
button{font-family:var(--sans);cursor:pointer}
:focus-visible{outline:2.5px solid var(--blue);outline-offset:2px;border-radius:6px}

/* top bar */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:16px;
  padding:14px 22px;background:rgba(250,250,247,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:baseline;gap:10px}
.brand .mark{font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:#fff;background:var(--blue-deep);
  padding:5px 8px;border-radius:6px;text-transform:uppercase}
.brand b{font-family:var(--serif);font-weight:600;font-size:17px}
.brand span{color:var(--muted);font-size:13px}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:14px}
.prog{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-soft)}
.ring{--p:0;width:34px;height:34px;border-radius:50%;
  background:conic-gradient(var(--blue) calc(var(--p)*1%),var(--line) 0);display:grid;place-items:center}
.ring i{width:26px;height:26px;border-radius:50%;background:var(--paper);display:grid;place-items:center;
  font-size:10px;font-style:normal;font-weight:600;color:var(--ink)}
.due-badge{display:inline-flex;align-items:center;gap:7px;background:var(--amber-fill);color:var(--amber);
  border:1px solid var(--amber-line);padding:6px 11px;border-radius:999px;font-size:13px;font-weight:600}
.due-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--amber)}
.menu-btn{display:none;border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:7px 10px;font-size:18px;line-height:1}

/* layout */
.wrap{display:grid;grid-template-columns:268px 1fr;min-height:calc(100vh - 63px)}
.sidebar{border-right:1px solid var(--line);padding:18px 14px 60px;background:var(--paper);position:sticky;top:63px;height:calc(100vh - 63px);overflow:auto}
.nav-sec{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:16px 10px 7px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:0;background:none;
  padding:8px 10px;border-radius:8px;color:var(--ink-soft);font-size:13.5px}
.nav-item:hover{background:var(--surface-2)}
.nav-item.active{background:#fff;color:var(--ink);box-shadow:var(--shadow);font-weight:500}
.nav-item .code{font-family:var(--mono);font-size:10.5px;color:var(--muted);min-width:30px}
.nav-item.active .code{color:var(--blue)}
.nav-item .tick{margin-left:auto;font-size:11px;color:var(--green)}
.nav-item .lock{margin-left:auto;font-size:11px;color:var(--muted)}

.content{padding:34px 40px 90px;max-width:880px}
.section-fade{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* dashboard */
.hero{margin-bottom:26px}
.hero h1{font-size:34px;margin:6px 0 8px}
.hero p{color:var(--ink-soft);font-size:16px;margin:0;max-width:62ch}
.cards-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:24px 0}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.tile h3{margin:0 0 4px;font-size:18px}
.tile p{margin:0;color:var(--muted);font-size:13.5px}
.tile .big{font-family:var(--serif);font-size:30px;color:var(--ink)}
.cta{display:inline-flex;align-items:center;gap:8px;margin-top:14px;background:var(--blue-deep);color:#fff;border:0;
  padding:10px 16px;border-radius:8px;font-size:14px;font-weight:500}
.cta:hover{background:#16294f}
.cta.amber{background:var(--amber);} .cta.amber:hover{background:#8f590e}
.cta.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)} .cta.ghost:hover{background:var(--surface-2)}

.mod-list{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.mod{display:grid;grid-template-columns:46px 1fr auto;gap:14px;align-items:center;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;text-align:left;width:100%}
.mod:hover{box-shadow:var(--shadow);border-color:#d7dde6}
.mod .code{font-family:var(--mono);font-size:13px;color:var(--blue);font-weight:600}
.mod .t{font-family:var(--serif);font-size:16.5px;color:var(--ink)}
.mod .o{color:var(--muted);font-size:13px;margin-top:2px}
.mod .meta{text-align:right;font-size:12px;color:var(--muted);white-space:nowrap}
.bar{height:5px;background:var(--line-soft);border-radius:999px;overflow:hidden;margin-top:7px;width:130px}
.bar i{display:block;height:100%;background:var(--green)}
.pill{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:5px}
.pill.ready{background:var(--green-fill);color:var(--green)}
.pill.soon{background:var(--surface-2);color:var(--muted)}

/* module view */
.crumb{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.mv h1{font-size:30px;margin:4px 0 6px}
.mv .lead{color:var(--ink-soft);font-size:16px;margin:0 0 18px}
.note{background:var(--amber-fill);border:1px solid var(--amber-line);border-left:4px solid var(--amber);
  border-radius:8px;padding:13px 16px;color:#6c4710;font-size:14px;margin:18px 0}
.sub{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin:12px 0;overflow:hidden}
.sub > summary{list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:center;gap:12px;font-weight:500;font-size:15.5px}
.sub > summary::-webkit-details-marker{display:none}
.sub > summary .chev{margin-left:auto;color:var(--muted);transition:transform .2s}
.sub[open] > summary .chev{transform:rotate(90deg)}
.sub .body{padding:2px 18px 18px 46px}
.sub .body ul{margin:6px 0;padding-left:18px}
.sub .body li{margin:5px 0;color:var(--ink-soft);font-size:14.5px}
.chk{appearance:none;width:18px;height:18px;border:1.5px solid #c4ccd8;border-radius:5px;display:grid;place-items:center;flex:0 0 auto}
.chk:checked{background:var(--green);border-color:var(--green)}
.chk:checked::after{content:"✓";color:#fff;font-size:12px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0 8px}

/* flashcards */
.fc-stage{max-width:620px;margin:8px auto}
.fc-meta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:12px}
.flashcard{perspective:1600px;height:300px;margin:6px 0 18px}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flashcard.flip .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:center;padding:32px;text-align:center}
.fc-face .lbl{position:absolute;top:16px;left:20px}
.fc-face .q{font-family:var(--serif);font-size:22px;line-height:1.4}
.fc-back{transform:rotateY(180deg);text-align:left}
.fc-back .a{font-size:16px;color:var(--ink-soft);line-height:1.6}
.fc-hint{text-align:center;color:var(--muted);font-size:13px}
.rate{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:620px;margin:0 auto}
.rate button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:11px 8px;font-size:14px;font-weight:500}
.rate button small{display:block;font-weight:400;color:var(--muted);font-size:11.5px;margin-top:2px}
.rate .again:hover{border-color:#d98b8b;background:#fcf0f0}
.rate .good:hover{border-color:var(--blue);background:#eef5fb}
.rate .easy:hover{border-color:var(--green);background:var(--green-fill)}
.leitner{display:flex;gap:6px;justify-content:center;margin:16px 0 4px}
.leitner .b{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:5px 9px;background:#fff}
.leitner .b b{color:var(--ink)}

/* quiz */
.quiz{max-width:680px}
.qitem{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin:12px 0}
.qitem .q{font-weight:500;margin-bottom:12px;font-size:15.5px}
.opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:8px;
  padding:11px 14px;margin:7px 0;font-size:14.5px;color:var(--ink-soft)}
.opt:hover{border-color:#c8d2de;background:var(--surface-2)}
.opt.correct{border-color:var(--green);background:var(--green-fill);color:var(--green);font-weight:500}
.opt.wrong{border-color:#d98b8b;background:#fcf0f0;color:#9c3a3a}
.opt .fb{float:right;font-size:12px}

/* reference */
.ref h2{font-size:22px;margin:30px 0 10px}
table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;margin:8px 0 4px;background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
table.tbl th{background:var(--blue-deep);color:#fff;text-align:left;padding:9px 12px;font-weight:600;font-family:var(--sans);font-size:12.5px}
table.tbl td{padding:8px 12px;border-top:1px solid var(--line-soft);color:var(--ink-soft);vertical-align:top}
table.tbl tr:nth-child(even) td{background:#fafbfc}
.chain{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:8px;
  padding:14px 18px;font-family:var(--mono);font-size:13px;color:var(--ink);line-height:1.9;overflow-wrap:anywhere}
.kbd{font-family:var(--mono);font-size:11px;background:var(--surface-2);border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 6px}
.empty{color:var(--muted);text-align:center;padding:50px 20px}
.empty .big{font-family:var(--serif);font-size:24px;color:var(--ink);margin-bottom:6px}
footer.tiny{color:var(--muted);font-size:12px;margin-top:40px;border-top:1px solid var(--line);padding-top:16px}

@media (max-width:860px){
  .wrap{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:63px;width:80%;max-width:300px;transform:translateX(-105%);transition:transform .25s;z-index:25;box-shadow:var(--shadow)}
  .sidebar.open{transform:none}
  .menu-btn{display:block}
  .content{padding:24px 20px 80px}
  .cards-row{grid-template-columns:1fr}
  .hero h1{font-size:27px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="topbar">
  <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">☰</button>
  <div class="brand">
    <span class="mark">IAM&nbsp;SA</span>
    <b>Mastery Course</b>
    <span>from requirement to defensible solution</span>
  </div>
  <div class="right">
    <button class="due-badge" id="dueBadge" title="Spaced-repetition cards due">
      <span class="dot"></span><span id="dueCount">0</span> to review
    </button>
    <div class="prog"><div class="ring" id="ring"><i id="ringTxt">0%</i></div><span>course</span></div>
  </div>
</div>

<div class="wrap">
  <aside class="sidebar" id="sidebar">
    <div class="nav-sec">Study</div>
    <button class="nav-item" data-route="home"><span class="code">⌂</span> Dashboard</button>
    <button class="nav-item" data-route="review"><span class="code">↻</span> Review due <span class="tick" id="navDue"></span></button>
    <button class="nav-item" data-route="reference"><span class="code">§</span> Reference</button>
    <div class="nav-sec">Modules</div>
    <div id="navModules"></div>
    <div class="nav-sec">Tip</div>
    <div style="padding:6px 10px;color:var(--muted);font-size:12.5px;line-height:1.5">
      Press <span class="kbd">Space</span> to flip a card, <span class="kbd">1</span>/<span class="kbd">2</span>/<span class="kbd">3</span> to rate it.
    </div>
  </aside>

  <main class="content"><div id="view"></div></main>
</div>

<script>
/* ---------- storage with in-memory fallback ---------- */
const Store={mem:{},get(k,d){try{const v=localStorage.getItem(k);return v==null?(this.mem[k]??d):JSON.parse(v);}catch(e){return this.mem[k]??d;}},
set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){this.mem[k]=v;}}};
const DAY=864e5, today=()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();};
const INTERVALS=[0,1,3,7,16,35]; // by Leitner box

/* ---------- course data ---------- */
const M0POINTS={
"m0-1":{t:"What IAM is, and authentication vs authorization",pts:[
 "IAM is a discipline, not a product: managing digital identities and what they're allowed to do across every system.",
 "Authentication = \u201Care you who you say you are?\u201D (showing your badge).",
 "Authorization = \u201Cwhat are you allowed to do?\u201D (which doors the badge opens).",
 "Almost every IAM conversation reduces to one of these two, plus the administration and governance around them."]},
"m0-2":{t:"The identity lifecycle: Joiner \u2013 Mover \u2013 Leaver (JML)",pts:[
 "Joiner: created and granted role-appropriate access, ideally automatically on day one.",
 "Mover: role/department change \u2014 old access should be removed, new granted. This is where privilege creep happens.",
 "Leaver: every credential and entitlement revoked promptly \u2014 the most common audit finding when it isn't.",
 "Solutioning lens: most IGA scope and run volume is JML at scale. A client's JML maturity signals the size of the problem."]},
"m0-3":{t:"The six towers and how they interconnect",pts:[
 "Directory Services \u2014 the foundation; authoritative store of identities and attributes.",
 "Access Management \u2014 runtime login: SSO, MFA, federation.",
 "IGA \u2014 \u201Cshould this person have this access?\u201D: provisioning, requests, roles, certifications.",
 "PAM \u2014 the vault for powerful accounts: credential vaulting, session control, JIT.",
 "PKI / CLM \u2014 certificates and keys that let machines prove identity and encrypt traffic.",
 "Identity Proofing \u2014 \u201Cis this real-world person who they claim to be?\u201D at enrolment.",
 "They stack and feed each other \u2014 one new hire on day one touches all six."]},
"m0-4":{t:"The standards you must recognise in an RFP",pts:[
 "SAML 2.0 \u2014 XML browser-SSO federation; still dominant in enterprise apps.",
 "OIDC / OAuth 2.0 \u2014 modern token auth (OIDC) and delegated authorization (OAuth); default for APIs/SaaS/mobile.",
 "SCIM \u2014 standard automated provisioning/de-provisioning to SaaS.",
 "LDAP \u2014 the directory query/modify protocol.",
 "FIDO2 / WebAuthn \u2014 phishing-resistant passwordless (passkeys, security keys).",
 "X.509 \u2014 the certificate format under PKI/TLS.",
 "Rule of thumb: count the apps, classify by protocol \u2014 it's the biggest AM/IGA effort driver."]},
"m0-5":{t:"NIST 800-63 assurance levels (IAL / AAL / FAL)",pts:[
 "NIST SP 800-63-4 (finalised mid-2025) defines graded assurance.",
 "IAL = identity proofing strength; AAL = authentication strength; FAL = federation strength.",
 "Rev 4 restructures proofing into four types and adds deepfake / injection-attack controls.",
 "When a requirement cites an assurance level, it's pointing at this document."]},
"m0-6":{t:"Capability towers vs delivery functions (the matrix)",pts:[
 "Towers = the \u201Cwhat\u201D (vertical capabilities). Delivery functions = the \u201Chow\u201D (horizontal disciplines).",
 "The functions \u2014 Architecture, Business Analysis, Engineering, Testing, Project Mgmt, Operations/Run, Audit, Reporting \u2014 cut across every tower.",
 "A team named \u201CIAM Testing\u201D serves every tower; it's organised by discipline, not capability.",
 "You never staff a tower in isolation \u2014 you staff the matrix. Role-wise view = bands \u00D7 functions; phase-wise view = functions over time.",
 "CIAM is an applied cross-tower domain (not a tower); ISPM/ITDR/CIEM is a cross-cutting posture layer."]},
};

const MODULES=[
 {code:"M0",title:"Foundations & IAM operating model",hrs:3,ready:true,
  outcome:"Speak the language; map any requirement to a tower.",
  lead:"The shape of the whole field before we go tower by tower. Everything later hangs off these six ideas.",
  subs:[
   {id:"m0-1",t:"What IAM is; authentication vs authorization"},
   {id:"m0-2",t:"The Joiner\u2013Mover\u2013Leaver lifecycle"},
   {id:"m0-3",t:"The six towers and how they interconnect"},
   {id:"m0-4",t:"Standards: SAML, OIDC, OAuth, SCIM, LDAP, FIDO2, X.509"},
   {id:"m0-5",t:"NIST 800-63 assurance levels (IAL/AAL/FAL)"},
   {id:"m0-6",t:"Capability towers vs delivery functions (the matrix)"},
  ]},
 {code:"M1",title:"Directory Services",hrs:4,ready:false,
  outcome:"Design the identity foundation and sync/consolidation approach.",
  subs:[{id:"m1-1",t:"Directory concepts and data model"},{id:"m1-2",t:"Active Directory vs Microsoft Entra ID"},
   {id:"m1-3",t:"Sync, consolidation and virtual directory"},{id:"m1-4",t:"SI & Transform: lifecycle and effort drivers"},
   {id:"m1-5",t:"Run / BAU, automation & licensing"},{id:"m1-6",t:"Worked estimation example"}]},
 {code:"M2",title:"Access Management (SSO, MFA, Federation)",hrs:6,ready:false,
  outcome:"Scope app onboarding and authentication modernisation.",
  subs:[{id:"m2-1",t:"SSO concepts and session model"},{id:"m2-2",t:"Federation: SAML and OIDC/OAuth flows"},
   {id:"m2-3",t:"MFA and passwordless (FIDO2/passkeys)"},{id:"m2-4",t:"Conditional / risk-based access"},
   {id:"m2-5",t:"Application onboarding patterns"},{id:"m2-6",t:"SI lifecycle, Run, automation & licensing"},{id:"m2-7",t:"Worked estimation example"}]},
 {code:"M3",title:"Identity Governance & Administration",hrs:9,ready:false,
  outcome:"Scope JML, access requests, roles and certifications at scale.",
  subs:[{id:"m3-1",t:"JML and automated provisioning"},{id:"m3-2",t:"Access request and approval workflows"},
   {id:"m3-3",t:"Role modelling: RBAC and ABAC"},{id:"m3-4",t:"Segregation of Duties (SoD)"},
   {id:"m3-5",t:"Access certifications / recertification"},{id:"m3-6",t:"Connectors and application onboarding"},
   {id:"m3-7",t:"SI lifecycle and effort drivers"},{id:"m3-8",t:"Run / BAU, automation & AI, licensing"},{id:"m3-9",t:"Worked estimation example"}]},
 {code:"M4",title:"Privileged Access Management",hrs:8,ready:false,
  outcome:"Scope vaulting, session control and JIT for privileged accounts.",
  subs:[{id:"m4-1",t:"Credential vaulting and management"},{id:"m4-2",t:"Session management and recording"},
   {id:"m4-3",t:"Just-in-time access and Zero Standing Privilege"},{id:"m4-4",t:"Secrets and workload / machine identity"},
   {id:"m4-5",t:"Account discovery and onboarding"},{id:"m4-6",t:"SI lifecycle and effort drivers"},
   {id:"m4-7",t:"Run / BAU, automation & licensing"},{id:"m4-8",t:"Worked estimation example"}]},
 {code:"M5",title:"PKI & Certificate Lifecycle Management",hrs:6,ready:false,
  outcome:"Scope CA build/modernisation and certificate automation.",
  subs:[{id:"m5-1",t:"PKI concepts and CA hierarchy"},{id:"m5-2",t:"Certificate lifecycle (issue/renew/revoke)"},
   {id:"m5-3",t:"Discovery and automation"},{id:"m5-4",t:"Lifetime reduction and post-quantum readiness"},
   {id:"m5-5",t:"SI lifecycle, Run, licensing"},{id:"m5-6",t:"Worked estimation example"}]},
 {code:"M6",title:"Identity Proofing & Verification",hrs:4,ready:false,
  outcome:"Scope proofing to assurance levels and fraud controls.",
  subs:[{id:"m6-1",t:"Proofing concepts and assurance levels (IAL)"},{id:"m6-2",t:"Document, biometric and liveness checks"},
   {id:"m6-3",t:"Deepfake and injection-attack controls"},{id:"m6-4",t:"Verifiable credentials and wallets"},
   {id:"m6-5",t:"SI lifecycle, Run, licensing & estimation"}]},
 {code:"M7",title:"Customer IAM (CIAM)",hrs:5,ready:false,
  outcome:"Scope external/consumer identity, consent and scale.",
  subs:[{id:"m7-1",t:"CIAM vs workforce IAM: what changes"},{id:"m7-2",t:"Registration, social login, progressive profiling"},
   {id:"m7-3",t:"Consent, privacy and preference management"},{id:"m7-4",t:"Scale, performance and bot/fraud defence"},
   {id:"m7-5",t:"SI lifecycle, Run, MAU licensing & estimate"}]},
 {code:"M8",title:"ISPM, ITDR & CIEM",hrs:4,ready:false,
  outcome:"Scope posture, threat detection and cloud entitlements across towers.",
  subs:[{id:"m8-1",t:"ISPM concepts: what posture is assessed"},{id:"m8-2",t:"ISPM vs ITDR vs CIEM \u2014 how they differ"},
   {id:"m8-3",t:"Posture across towers (stale, shadow admin, NHI)"},{id:"m8-4",t:"Integration with SIEM/SOC and remediation"},
   {id:"m8-5",t:"Delivery, Run, licensing & estimation"}]},
 {code:"M9",title:"Estimation, Staffing & Project Planning",hrs:7,ready:false,
  outcome:"Build defensible estimates, pyramids and phase plans cross-tower.",
  subs:[{id:"m9-1",t:"Estimation approaches and when to use each"},{id:"m9-2",t:"Effort drivers per tower"},

const FLASHCARDS=[
 ["M0","The two core verbs at the heart of IAM?","Authentication (\u201Care you who you say you are?\u201D) and Authorization (\u201Cwhat are you allowed to do?\u201D)."],
 ["M0","What does JML stand for, and why does it matter for scoping?","Joiner\u2013Mover\u2013Leaver. Most IGA scope and run volume is JML at scale, so the client's JML maturity signals the size of the problem."],
 ["M0","At which lifecycle stage does privilege creep happen?","Mover \u2014 old access isn't removed while new access is granted."],
 ["M0","The most common audit finding in the identity lifecycle?","Leaver access (credentials/entitlements) not revoked promptly."],
 ["M0","Name the six capability towers.","Directory Services, Access Management, IGA, PAM, PKI/CLM, Identity Proofing."],
 ["M0","Which tower is the foundation everything reads from?","Directory Services \u2014 the authoritative store of identities and attributes."],
 ["M0","What question does IGA answer?","\u201CShould this person have this access?\u201D \u2014 provisioning, requests, roles, certifications."],
 ["M0","What does PAM secure, and how?","The most powerful accounts (admin/root/service) via credential vaulting, session control and just-in-time access."],
 ["M0","Biggest single effort driver in an AM or IGA estimate?","The number and protocol-type of application integrations. Count the apps, then classify by protocol."],
 ["M0","SAML vs OIDC vs OAuth \u2014 one line each.","SAML = XML browser-SSO federation; OIDC = modern token authentication; OAuth = delegated authorization (APIs/SaaS/mobile)."],
 ["M0","What is SCIM for?","Standard automated user provisioning and de-provisioning to SaaS applications."],
 ["M0","What does FIDO2 / WebAuthn give you?","Phishing-resistant passwordless authentication using passkeys and security keys."],
 ["M0","IAL / AAL / FAL \u2014 source and meaning?","NIST SP 800-63-4. Identity (proofing), Authentication, and Federation assurance levels."],
 ["M0","Is CIAM a capability tower?","No \u2014 it's an applied cross-tower domain (Access Mgmt + Directory + Proofing for external users at scale; usually per-MAU licensing)."],
 ["M0","Is ISPM a tower?","No \u2014 a cross-cutting posture layer over all towers. Cousins: ITDR (reactive detection/response) and CIEM (cloud entitlements)."],
 ["M0","Towers vs delivery functions \u2014 the distinction?","Towers = the \u201Cwhat\u201D (vertical capabilities). Functions (Engineering, Testing, BA, Audit, Reporting...) = the \u201Chow\u201D, cutting across every tower."],
 ["M0","Recite the estimate-to-justification chain.","Requirement \u2192 Scope item \u2192 Activities (WBS) \u2192 Effort driver & assumption \u2192 Effort \u2192 Role split \u2192 FTE \u2192 Cost \u2192 Phase plan."],
 ["M0","Why must you price two environments?","Non-Prod + Prod: every config, connector and use case must be promoted and re-verified, so environment count multiplies build/test effort."],
 ["M0","A staffing plan is which two things crossed?","Bands (seniority: SA, Senior Engineer, Engineer, Analyst/Offshore) \u00D7 functions (discipline). That cross-tab is your role-wise view."],
 ["M0","Current leaders: PAM, IGA, Access Management?","PAM: CyberArk, Delinea, BeyondTrust. IGA: SailPoint, Saviynt. Access Management: Okta, Microsoft, Ping."],

 ["M1","What is a directory service, in one line?","The authoritative store of identities and their attributes that every other IAM system reads from or writes to."],
 ["M1","AD DS vs Microsoft Entra ID?","AD DS = on-prem directory (LDAP/Kerberos); Entra ID = cloud identity directory (formerly Azure AD, modern protocols). Usually synced together."],
 ["M1","What syncs on-prem AD to Entra ID?","Microsoft Entra Connect (Connect Sync or Cloud Sync)."],
 ["M1","Domain vs forest in Active Directory?","A domain is an identity/admin boundary; a forest is the top-level security boundary containing domains that share a schema."],
 ["M1","What is a virtual directory / identity data fabric, and when is it useful?","A layer presenting many identity sources as one logical view without migrating data \u2014 useful in M&A and messy multi-source estates (e.g. Radiant Logic)."],
 ["M1","Why is Directory Services the foundation tower?","Every other tower reads identities/attributes from it; its data quality caps everything downstream."],
 ["M1","Biggest hidden-cost driver in a directory project?","Directory health \u2014 stale/duplicate objects, schema sprawl, GPO complexity, and apps with hard LDAP/Kerberos binds."],
 ["M1","Why are LDAP/Kerberos-bound apps a migration risk?","They authenticate directly to the directory, so re-pointing or modernising them during consolidation is effort and regression risk."],
 ["M1","Name three directory effort drivers.","Number of directories/domains/forests to consolidate; object/identity counts; number of apps bound to the directory."],
 ["M1","What is hybrid join?","A device identity joined to both on-prem AD and Entra ID, enabling SSO and conditional access for the device."],
 ["M1","Typical directory licensing basis?","Often per-identity tiers (e.g. Entra ID P1/P2); on-prem AD is bundled with Windows Server but carries infra and run cost."],
 ["M1","What does the directory do in JML terms?","Holds the identity record created at Joiner and updated through Mover/Leaver \u2014 it's the spine the lifecycle writes to."],

 ["M2","What problem does Access Management solve?","Runtime authentication and access \u2014 proving identity at login and granting app access via SSO, MFA and federation."],
 ["M2","What is SSO?","Single Sign-On \u2014 one authentication grants access to many apps without re-entering credentials."],
 ["M2","SAML in one line?","XML-based federation protocol for browser SSO; still dominant in enterprise app integrations."],
 ["M2","OIDC vs OAuth 2.0?","OAuth 2.0 = delegated authorization (access to resources); OIDC = an identity/authentication layer on top of OAuth."],
 ["M2","IdP vs SP/RP?","The Identity Provider authenticates the user; the Service Provider (SAML) or Relying Party (OIDC) is the app that trusts the IdP."],
 ["M2","What is federation?","A trust relationship between identity domains so one login works across organisations and apps."],
 ["M2","What does FIDO2 / WebAuthn give you?","Phishing-resistant passwordless authentication using passkeys or security keys bound to the origin."],
 ["M2","What is conditional / risk-based access?","Policies that allow, block or step-up authentication based on signals \u2014 user, device, location, risk \u2014 at sign-in."],
 ["M2","Single biggest effort driver in an AM estimate?","Number of applications to onboard, classified by protocol (SAML / OIDC / WS-Fed / header-based / password-vaulting)."],
 ["M2","Which app integrations are cheap vs expensive?","Standards-based (SAML/OIDC/SCIM) are cheap and repeatable; legacy, header-based and custom integrations are expensive."],
 ["M2","Biggest L1 volume-reduction lever in AM?","Self-service password reset and self-service MFA management."],
 ["M2","What is step-up authentication?","Requiring stronger or additional authentication for sensitive actions or higher-risk contexts."],
 ["M2","Key non-functional sizing input for AM?","Peak authentication load \u2014 logins per day and concurrent sessions."],
 ["M2","Where does Access Management sit relative to the directory?","On top of it \u2014 AM authenticates the identities that live in the directory."],

 ["M3","What does IGA govern?","The identity lifecycle and the question \u201Cshould this person have this access?\u201D \u2014 provisioning, requests, roles, certifications."],
 ["M3","What is birthright access?","Baseline access granted automatically at Joiner based on role or attributes."],
 ["M3","RBAC vs ABAC?","RBAC grants access through roles; ABAC grants access through attribute-based policies (user/resource/context attributes)."],
 ["M3","What is an access certification / recertification?","A periodic review where approvers confirm or revoke users' access \u2014 a core compliance control."],
 ["M3","What is Segregation of Duties (SoD)?","Preventing toxic combinations of access that would let one person both commit and conceal fraud."],
 ["M3","Core effort driver in an IGA build?","Number of applications to integrate and the connector type \u2014 out-of-box vs custom/legacy."],
 ["M3","OOB vs custom connector \u2014 cost implication?","Out-of-box connectors are quick and cheap; custom/legacy connectors are the expensive line item."],
 ["M3","Provisioning vs governance-only integration?","Provisioning writes/changes accounts in the target app; governance-only reads entitlements for review without provisioning."],
 ["M3","What drives certification run effort?","Population size, campaign frequency, reviewer count and lines per campaign."],
 ["M3","A major AI lever in IGA?","Outlier/peer-group analytics so certifications focus on the few anomalies; role mining and access recommendations."],
 ["M3","Why is HR-feed data quality critical to IGA?","Movers and leavers are detected from it; poor data breaks automated JML and inflates every downstream estimate."],
 ["M3","Current IGA market leaders, and SailPoint's two products?","Leaders: SailPoint and Saviynt. SailPoint = Identity Security Cloud (SaaS) and IdentityIQ (software)."],
 ["M3","Typical IGA licensing basis?","Per identity, often modular \u2014 provisioning, governance and analytics priced separately."],
 ["M3","JML volumes feed which estimate?","Run FTE sizing and the automation business case (joiners/movers/leavers per month or year)."],
 ["M3","Where does IGA sit relative to directory and AM?","It governs and provisions the identities in the directory and the access used by AM \u2014 the lifecycle and governance brain."],
].map((c,i)=>({id:"fc"+i,mod:c[0],q:c[1],a:c[2]}));

const QUIZ=[
 {q:"Which is the single most common audit finding in the identity lifecycle?",o:["Joiner given access a day late","Mover keeps a stale entitlement","Leaver access not revoked promptly","MFA not enforced on one app"],c:2},
 {q:"Which tower is the foundation the others read from?",o:["IGA","Access Management","Directory Services","PAM"],c:2},
 {q:"What is the biggest single effort driver in an Access Management or IGA estimate?",o:["Number of help-desk agents","Number and protocol-type of application integrations","Choice of cloud provider","Brand of MFA token"],c:1},
 {q:"CIAM is best described as...",o:["A seventh capability tower","An applied cross-tower domain for external identities","A licensing model","A type of directory"],c:1},
 {q:"Engineering, Testing, Business Analysis, Audit and Reporting are...",o:["Capability towers","Delivery functions that cut across every tower","Run-only activities","NIST assurance levels"],c:1},
 {q:"IAL, AAL and FAL are defined by which standard?",o:["ISO 27001","SAML 2.0","NIST SP 800-63","PCI-DSS"],c:2},
];

/* ---------- state ---------- */
let progress=Store.get("iam_progress",{});      // subId -> true
let cards=Store.get("iam_cards",{});            // fcId -> {box,due}
let route={view:"home",mod:null};
let session=null;                                // flashcard session

const totalSubs=MODULES.reduce((a,m)=>a+m.subs.length,0);
const doneCount=()=>Object.values(progress).filter(Boolean).length;
const modPct=m=>Math.round(100*m.subs.filter(s=>progress[s.id]).length/m.subs.length);
function cardState(id){return cards[id]||{box:0,due:0};}
function dueReview(){const t=today();return FLASHCARDS.filter(c=>cards[c.id]&&cards[c.id].due<=t);}
function newCards(mod){return FLASHCARDS.filter(c=>!cards[c.id]&&(!mod||c.mod===mod));}
function firstNewMod(){const c=newCards()[0];return c?c.mod:"M0";}
function hasCards(mod){return FLASHCARDS.some(c=>c.mod===mod);}

/* ---------- chrome ---------- */
function refreshChrome(){
  const pct=Math.round(100*doneCount()/totalSubs);
  document.getElementById("ring").style.setProperty("--p",pct);
  document.getElementById("ringTxt").textContent=pct+"%";
  const d=dueReview().length;
  document.getElementById("dueCount").textContent=d;
  document.getElementById("navDue").textContent=d?d:"";
  document.getElementById("dueBadge").style.display=d?"inline-flex":"none";
  document.querySelectorAll(".nav-item").forEach(b=>{
    b.classList.toggle("active", b.dataset.route===route.view && (!b.dataset.mod || b.dataset.mod===route.mod));
  });
}
function buildNav(){
  const box=document.getElementById("navModules");
  box.innerHTML="";
  MODULES.forEach(m=>{
    const b=document.createElement("button");
    b.className="nav-item"; b.dataset.route="module"; b.dataset.mod=m.code;
    const done=modPct(m)===100;
    b.innerHTML=`<span class="code">${m.code}</span> ${m.title.length>26?m.title.slice(0,25)+"\u2026":m.title}
      ${done?'<span class="tick">\u2713</span>':(m.ready?'':'<span class="lock">\u25CB</span>')}`;
    b.onclick=()=>go("module",m.code);
    box.appendChild(b);
  });
}

/* ---------- router ---------- */
function go(view,mod){route={view,mod:mod||null};session=null;document.getElementById("sidebar").classList.remove("open");render();window.scrollTo(0,0);}
document.querySelectorAll('.nav-item[data-route]').forEach(b=>b.onclick=()=>go(b.dataset.route));
document.getElementById("menuBtn").onclick=()=>document.getElementById("sidebar").classList.toggle("open");
document.getElementById("dueBadge").onclick=()=>go("review");

/* ---------- views ---------- */
function render(){
  const v=document.getElementById("view");
  v.className="section-fade";
  if(route.view==="home") v.innerHTML=viewHome();
  else if(route.view==="module") v.innerHTML=viewModule(MODULES.find(m=>m.code===route.mod));
  else if(route.view==="review"){startSession(dueReview(),"Review due today");v.innerHTML=viewFlash();}
  else if(route.view==="flash"){v.innerHTML=viewFlash();}
  else if(route.view==="quiz") v.innerHTML=viewQuiz(MODULES.find(m=>m.code===route.mod));
  else if(route.view==="reference") v.innerHTML=viewReference();
  bindView();
  buildNav();refreshChrome();
}

function viewHome(){
  const due=dueReview().length;
  const fresh=newCards().length;
  const recallHead = due? due+" cards due" : (fresh? fresh+" new cards ready" : "All caught up");
  const recallBtn = due? `<button class="cta amber" onclick="go('review')">Start review</button>`
                    : (fresh? `<button class="cta amber" onclick="go('flash','${firstNewMod()}')">Study new cards</button>`
                            : `<button class="cta ghost" onclick="go('reference')">Open reference</button>`);
  const next=MODULES.find(m=>modPct(m)<100)||MODULES[0];
  return `<div class="hero">
    <div class="eyebrow">Personal learning system</div>
    <h1>Become an IAM Solution Architect.</h1>
    <p>Learn the field tower by tower, then turn it into scope, estimates, staffing and defensible proposals. This site is built to make the core <em>stick</em> \u2014 short lessons, active-recall flashcards, and spaced review that surfaces a concept right before you'd forget it.</p>
  </div>
  <div class="cards-row">
    <div class="tile">
      <div class="eyebrow">Recall engine</div>
      <h3>${recallHead}</h3>
      <p>New cards wait under each module until you study them; once rated, they flow into your spaced review. Two minutes here beats an hour of re-reading.</p>
      ${recallBtn}
    </div>
    <div class="tile">
      <div class="eyebrow">Keep going</div>
      <h3>${next.code} \u00B7 ${next.title}</h3>
      <p>${next.outcome}</p>
      <button class="cta" onclick="go('module','${next.code}')">Open module</button>
    </div>
  </div>
  <div class="eyebrow" style="margin-top:8px">The curriculum</div>
  <div class="mod-list">
    ${MODULES.map(m=>`<button class="mod" onclick="go('module','${m.code}')">
      <span class="code">${m.code}</span>
      <span><span class="t">${m.title}</span><div class="o">${m.outcome}</div>
        <div class="bar"><i style="width:${modPct(m)}%"></i></div></span>
      <span class="meta">${m.hrs} hrs<br><span class="pill ${m.ready||hasCards(m.code)?'ready':'soon'}">${m.ready?'lesson ready':(hasCards(m.code)?'cards ready':'outline')}</span></span>
    </button>`).join("")}
  </div>
  <footer class="tiny">Progress and review schedule are saved in this browser. Host the folder anywhere (or open the file directly) and it remembers where you are.</footer>`;
}

function viewModule(m){
  const ready=m.ready;
  const content=ready?`
    ${m.subs.map(s=>{const p=M0POINTS[s.id];return `
      <details class="sub" ${s.id==='m0-1'?'open':''}>
        <summary>
          <input type="checkbox" class="chk" data-sub="${s.id}" ${progress[s.id]?'checked':''} onclick="event.stopPropagation()">
          ${p?p.t:s.t}<span class="chev">\u203A</span>
        </summary>
        <div class="body"><ul>${(p?p.pts:["Lesson content for this sub-topic unlocks when we cover it together."]).map(x=>`<li>${x}</li>`).join("")}</ul></div>
      </details>`}).join("")}
    <div class="toolbar">
      <button class="cta amber" onclick="go('flash')">Study this module's cards</button>
      <button class="cta ghost" onclick="go('quiz','${m.code}')">Take the quick check</button>
    </div>`
  :`
    <div class="note">${hasCards(m.code)
      ? "Primer flashcards are ready for this module now \u2014 you can start drilling the key facts below. The full written lesson (analogy, worked example, products and a tower estimate) unlocks here as we cover it together in a session."
      : "This module's outline is ready. The full lesson unlocks here as we cover it together in a session. You can still tick sub-topics as we go."}</div>
    ${hasCards(m.code)?`<div class="toolbar">
      <button class="cta amber" onclick="go('flash','${m.code}')">Study this module's cards</button>
    </div>`:''}
    <div class="eyebrow">Sub-topics we'll cover</div>
    ${m.subs.map(s=>`<details class="sub"><summary>
        <input type="checkbox" class="chk" data-sub="${s.id}" ${progress[s.id]?'checked':''} onclick="event.stopPropagation()">
        ${s.t}<span class="chev">\u203A</span></summary>
        <div class="body"><ul><li>Covered in an upcoming session; mark complete once we've worked through it.</li></ul></div>
      </details>`).join("")}`;
  return `<div class="mv">
    <div class="crumb"><span class="eyebrow">${m.code} \u00B7 ${m.hrs} hrs</span></div>
    <h1>${m.title}</h1>
    <p class="lead">${m.lead||m.outcome}</p>
    <div class="bar" style="width:100%;max-width:320px"><i style="width:${modPct(m)}%"></i></div>
    ${content}
    <footer class="tiny">Tip: tick a sub-topic only after the idea makes sense without looking \u2014 that honest check is what the recall engine builds on.</footer>
  </div>`;
}

/* flashcards */
function startSession(list,label){
  if(session && session.label===label) return;
  const deck=list.slice();
  session={label,deck,idx:0,flipped:false,reviewed:0,total:deck.length};
}
function viewFlash(){
  if(route.view==="flash") startSession(FLASHCARDS.filter(c=>c.mod===(route.mod||"M0")),"Module deck");
  if(!session||!session.deck.length){
    return `<div class="empty"><div class="big">All caught up.</div>No cards due right now. Come back tomorrow \u2014 spacing is doing its job.<br><br><button class="cta" onclick="go('home')">Back to dashboard</button></div>`;
  }
  if(session.idx>=session.deck.length){
    return `<div class="empty"><div class="big">Done \u2014 ${session.reviewed} cards reviewed.</div>Each card you rated has been rescheduled. The ones you found hard come back sooner.<br><br>
      <button class="cta" onclick="go('home')">Back to dashboard</button></div>`;
  }
  const c=session.deck[session.idx], st=cardState(c.id);
  return `<div class="fc-stage">
    <div class="fc-meta"><span>${session.label}</span><span>${session.idx+1} / ${session.deck.length}</span></div>
    <div class="flashcard ${session.flipped?'flip':''}" id="card">
      <div class="fc-inner">
        <div class="fc-face"><div class="lbl eyebrow">${c.mod} \u00B7 question</div><div class="q">${c.q}</div></div>
        <div class="fc-face fc-back"><div class="lbl eyebrow">${c.mod} \u00B7 answer</div><div class="a">${c.a}</div></div>
      </div>
    </div>
    ${session.flipped?`
      <div class="rate">
        <button class="again" onclick="rate(1)">Again<small>see it again now</small></button>
        <button class="good" onclick="rate(2)">Good<small>+${INTERVALS[Math.min(st.box+1,5)]} days</small></button>
        <button class="easy" onclick="rate(3)">Easy<small>+${INTERVALS[Math.min(st.box+2,5)]} days</small></button>
      </div>
      <div class="leitner"><span class="b">box <b>${st.box}</b></span><span class="b">due in <b>${INTERVALS[st.box]||0}</b> d</span></div>`
    :`<div class="fc-hint">Answer it in your head, then <button class="cta ghost" onclick="flip()">show answer</button> \u00B7 or press <span class="kbd">Space</span></div>`}
  </div>`;
}
function flip(){session.flipped=true;render();}
function rate(grade){
  const c=session.deck[session.idx], st=cardState(c.id);
  let box=st.box;
  if(grade===1) box=1; else if(grade===2) box=Math.min(box+1,5); else box=Math.min(box+2,5);
  if(grade===1){cards[c.id]={box:0,due:today()};} // relearn: stays due this session
  else cards[c.id]={box,due:today()+INTERVALS[box]*DAY};
  Store.set("iam_cards",cards);
  session.reviewed++;
  if(grade===1){ // move to end of deck for this session
    session.deck.push(c);
  }
  session.idx++; session.flipped=false; render();
}

/* quiz */
function viewQuiz(m){
  return `<div class="quiz">
    <div class="crumb"><span class="eyebrow">${m?m.code:'M0'} \u00B7 quick check</span></div>
    <h1>Quick check</h1>
    <p class="lead">No score is saved or judged \u2014 this is retrieval practice. Getting one wrong and seeing why is how it sticks.</p>
    ${QUIZ.map((q,i)=>`<div class="qitem" data-q="${i}">
      <div class="q">${i+1}. ${q.q}</div>
      ${q.o.map((o,j)=>`<button class="opt" data-i="${i}" data-j="${j}">${o}<span class="fb"></span></button>`).join("")}
    </div>`).join("")}
    <div class="toolbar"><button class="cta ghost" onclick="go('module','${m?m.code:'M0'}')">Back to module</button></div>
  </div>`;
}

    ${[["Directory","Microsoft Entra ID, Active Directory, Okta, Ping, Radiant Logic"],

/* ---------- bind interactions per render ---------- */
function bindView(){
  document.querySelectorAll('.chk[data-sub]').forEach(ch=>{
    ch.onchange=()=>{progress[ch.dataset.sub]=ch.checked;Store.set("iam_progress",progress);refreshChrome();
      const m=MODULES.find(x=>x.code===route.mod); if(m){document.querySelectorAll('.bar i').forEach(i=>i.style.width=modPct(m)+"%");}};
  });
  document.querySelectorAll('.opt').forEach(o=>{
    o.onclick=()=>{
      const qi=+o.dataset.i, correct=QUIZ[qi].c, chosen=+o.dataset.j;
      const item=document.querySelector(`.qitem[data-q="${qi}"]`);
      if(item.dataset.done) return; item.dataset.done="1";
      item.querySelectorAll('.opt').forEach(b=>{
        const j=+b.dataset.j;
        if(j===correct){b.classList.add("correct");b.querySelector('.fb').textContent="\u2713";}
        if(j===chosen&&chosen!==correct){b.classList.add("wrong");b.querySelector('.fb').textContent="\u2717";}
      });
    };
  });
}
/* keyboard for flashcards */
document.addEventListener("keydown",e=>{
  if(route.view!=="flash"&&route.view!=="review")return;
  if(!session||session.idx>=session.deck.length)return;
  if(e.code==="Space"){e.preventDefault(); if(!session.flipped)flip();}
  else if(session.flipped&&["Digit1","Digit2","Digit3"].includes(e.code)){rate(+e.code.slice(-1));}
});

buildNav();render();
</script>
